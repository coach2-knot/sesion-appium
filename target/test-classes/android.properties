# ============================================================================
# Configuración específica para Android
# ============================================================================
# Propiedades de Appium para la plataforma Android

# Nombre de la plataforma
platformName=Android

# Nombre del motor de automatización
automationName=UiAutomator2

# Nombre del dispositivo o emulador
# Opciones comunes:
# - Medium_Phone
# - emulator-5554
# - ASUS_PHONE (dispositivo físico)
deviceName=Medium_Phone

# Ruta relativa a la APK de la aplicación SauceLabs Demo App
# Descargar desde: https://github.com/saucelabs/my-demo-app-android/releases
app=apps/SauceLabs.apk

# Package y activities del APK
appPackage=com.saucelabs.mydemoapp.android
appActivity=com.saucelabs.mydemoapp.android.view.activities.SplashActivity
appWaitActivity=com.saucelabs.mydemoapp.android.view.activities.*

# Versión de Android (opcional, se auto-detecta en algunos casos)
# platformVersion=14

# Configuración adicional
autoGrantPermissions=true
autoAcceptAlerts=true
unicodeKeyboard=true
resetKeyboard=true
