# ============================================================================
# Configuración por defecto de Appium
# ============================================================================
# Propiedades base para la conexión con el servidor Appium

# URL del servidor Appium
appium.url=http://127.0.0.1:4723

# Plataforma por defecto (android o ios)
platform=android

# Timeout por defecto en segundos
timeout.seconds=15

# Configuración de reinicio de la aplicación
no.reset=false
full.reset=false
