# ============================================================================
# Configuración específica para iOS
# ============================================================================
# Propiedades de Appium para la plataforma iOS

# Nombre de la plataforma
platformName=iOS

# Nombre del engine de automatización
automationName=XCUITest

# Nombre del dispositivo o simulador
# Opciones comunes:
# - iPhone 15
# - iPhone 14
# - iPhone SE
deviceName=iPhone 15

# Versión de iOS del simulador
# Debe coincidir con una versión instalada en tu Mac
platformVersion=17.2

# Ruta a la aplicación compilada (.app)
# Compilar desde: https://github.com/saucelabs/my-demo-app-ios
# O descargar la app compilada
app=apps/SauceLabs.app

# UDID del dispositivo (si usas un dispositivo físico)
# udid=auto

# Configuración adicional para iOS
useSimulator=true
simpleIsVisibleCheck=true
